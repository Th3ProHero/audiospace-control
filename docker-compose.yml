version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: audiospace_db
    environment:
      POSTGRES_USER: audiospace
      POSTGRES_PASSWORD: audiospace_secret
      POSTGRES_DB: audiospace
      TZ: ${TZ:-America/Mexico_City}
    ports:
      - "5433:5432" # <-- PUERTO CORREGIDO PARA EVITAR CHOQUES
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audiospace -d audiospace"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audiospace_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://audiospace:audiospace_secret@postgres:5432/audiospace
      STORAGE_PATH: /storage
      JWT_SECRET: audiospace_jwt_secret_change_in_production
      NODE_ENV: production
      TZ: ${TZ:-America/Mexico_City}
    ports:
      - "3000:3000"
    volumes:
      - audio_storage:/storage
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  audio_storage:
    driver: local #######